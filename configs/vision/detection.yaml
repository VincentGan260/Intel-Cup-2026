# 单张图片目标检测配置。
# 修改模型、输入图片、置信度、输出目录、保留类别时，只改这个文件。

# 输入源：可以是图片路径、图片 URL；后续摄像头脚本中也可以使用 0 这类摄像头编号。
source: https://ultralytics.com/images/bus.jpg

# YOLO 模型推理参数。
detector:
  # Ultralytics will download the weight automatically when supported.
  # You can change this to yolov8n.pt if yolo26n.pt is unavailable locally.
  # 模型权重路径。若 yolo26n.pt 暂时不可用，可改成 yolov8n.pt 先跑通流程。
  model_path: yolo26n.pt

  # 置信度阈值：越高越严格，低置信度目标会被过滤。
  confidence: 0.25

  # 推理输入尺寸。一般先用 640，后续可为了速度调小。
  image_size: 640

  # 推理设备。null 表示让 Ultralytics 自动选择；也可填 cpu、0、cuda:0 等。
  device: null

# 输出设置（Ultralytics 约定）。
# 与语义分割等统一在 runs/vision/ 下：runs/vision/detect/<project>/<name>/
# 例如 project=yolo26n_demo、name=pred → runs/vision/detect/yolo26n_demo/pred/
output:
  # 是否保存带框结果图。
  save: true

  # predict 的 project 名（会出现在 runs/vision/detect/ 下面，建议用短英文名）。
  project: yolo26n_demo

  # 本次运行的子目录名。
  name: pred

  # true 表示同名目录存在时允许覆盖/复用，避免重复生成 pred2、pred3。
  exist_ok: true

  # Ultralytics 的 runs 根目录（相对项目根）。留空或 null 时默认为 runs/vision/，
  # 与语义分割等输出同属一个大目录。
  # 代码会用「绝对路径 project」保存到：<runs_dir>/detect/<project>/<name>/。
  runs_dir: runs/vision

# 训练配置，后续需要微调模型时使用。
train:
  data: coco8.yaml
  epochs: 3

# 验证配置，后续评估模型效果时使用。
val:
  data: coco8.yaml

# 导出配置，后续导出 ONNX/OpenVINO 时使用。
export:
  format: onnx
